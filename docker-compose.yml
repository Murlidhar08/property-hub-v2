services:
  postgres_db:
    image: postgres:17.4
    hostname: postgres_db
    container_name: postgres_db
    restart: always
    env_file:
      - .env.pod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '${POSTGRES_EXTERNAL_PORT}:${POSTGRES_PORT}'
    networks:
      - prisma-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 2s
      retries: 20

  app:
    build: .
    container_name: app-next
    env_file:
      - .env.pod
    ports:
      - "3000:3000"
    networks:
      - prisma-network
    restart: unless-stopped
    depends_on:
      postgres_db:
        condition: service_healthy
      settlr-migrate:
        condition: service_completed_successfully

  prisma-studio:
    image: node:24.15.0
    container_name: prisma-studio
    working_dir: /app
    volumes:
      - .:/app
    command: npx prisma studio --port 5555 --browser none
    ports:
      - "5555:5555"
    env_file:
      - .env.pod
    environment: 
      DATABASE_URL: ${DATABASE_URL}
    networks: 
      - prisma-network
    depends_on: 
      postgres_db: 
        condition: service_healthy

  settlr-migrate:
    image: node:24.15.0
    container_name: settlr-migrate
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      postgres_db:
        condition: service_healthy
    env_file:
      - .env.pod
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - prisma-network
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"

networks:
  prisma-network:
    name: prisma-network